{% extends 'auth/authbase.html' %}
{% load tailwind_filters %}

{% block content %}

<div class="flex flex-1 items-center justify-center bg-gray-50 h-[80vh] ">
    <div class="w-full md:w-1/2 md:w-1/3 border bg-white rounded-lg px-6 py-2">
        <h2 class="text-center text-xl font-bold py-2">Login to Your Account</h2>
        <form action="" method="post" class="mb-3">
            {% csrf_token %}
            {{form|crispy}}
            <button type="submit" class="text-xl px-4 py-2 bg-blue-700 hover:bg-blue-900 text-white w-full rounded-lg">Submit</button>
        </form>
        <a href="{% url 'authregister' %}" class="text-sm py-2 hover:underline">Create an Account?</a>

    </div>
</div>
  
{% endblock content %}
