{% extends 'admin/admin_base.html' %}

{% block content %}

<div class="flex flex-1 gap-5">
    <div class="w-9/12 w-full">
        <div class="flex flex-1 flex-col">
            <h2 class="text-lg font-medium space-y-3">Manage Generes</h2>
            <table class="w-full border bg-gray-50 mt-3">
                <thead>
                    <tr>
                        <th class="border py-2">Id</th>
                        <th class="border py-2">Name</th>
                        <th class="border py-2">Description</th>
                    </tr>
                </thead>
                <tbody>
                   
                   {% for genere in generes %}
                   <tr>
                    <td class="border p-2">{{genere.id}}</td>
                    <td class="border p-2">{{genere.title}}</td>
                    <td class="border p-2">{{genere.description}}</td>
                   </tr>
                    
                   {% endfor %}
                    
                </tbody>
            </table>
        </div>
    </div>
    <div class="w-3/12">
        <h2  class="text-lg font-medium space-y-3 items-center text-center">Insert Genere</h2>
    </div>
</div>
  
{% endblock content %}
