<div class="flex flex-1 bg-white border-b items-center justify-between px-10 gap-10 py-2 ">
    <a href="{% url 'homepage' %}">

        <h1 class="text-2xl font-bold text-purple-700">Bookshop</h1>
    </a>
    <form action="{% url 'filter' %}" method="get" class="flex-1" >
        <input type="search" name="search" class="border border-slate-200 w-full bg-slate-100 py-2 px-4 rounded-lg" 
        placeholder="Search by Title, Author, ISBN ">
        <input type="submit" value="" hidden>
    </form>
    <div class=" flex gap-2 items-center p-4 ">
        
        {% if user.is_authenticated %}
        <a href="{% url 'homepage' %}" class="px-2 text-md font-medium hover:underline">Hi, {{request.user.first_name}}</a>
        <a href="{% url 'authlogout' %}" class="px-2 text-md font-medium hover:underline">Logout</a>
        {% else %}

        <a href="{% url 'authlogin' %}" class="px-4 text-md font-medium hover:underline">Login</a>
        <a href="{% url 'authregister' %}" class="px-4 text-md font-medium hover:underline">Register</a>
        {% endif %}
        <button class="text-xl bg-purple-700 text-white px-5 py-2 rounded-lg hover:bg-purple-900">Cart</button>

    </div>
</div>

<div class="flex flex-1 px-10 bg-slate-100 devided-x">
    <a href="{% url 'homepage' %}" class="text-gray-800 border-r-2 border-slate-200 hover:bg-slate-200 py-2 px-2">All</a>
    
    {% for genere in generes %}
        
    <a href="{% url 'category_filter' genere.slug%}" class="text-gray-800 border-r-2 border-slate-200 hover:bg-slate-200 py-2 px-2">{{genere.title}}</a>
    {% endfor %}
        
</div>
